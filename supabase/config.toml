# Supabase local development config (supabase start).
# project_id is set by `supabase init/link`; kept generic here.
project_id = "miga"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "miga://auth/callback"
additional_redirect_urls = ["miga://auth/callback", "miga://**", "exp://**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Apple / Google OAuth — fill in real credentials in the dashboard for
# production; these env references are for local testing only.
[auth.external.apple]
enabled = true
client_id = "env(SUPABASE_AUTH_APPLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_APPLE_SECRET)"

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"

[edge_runtime]
enabled = true

[analytics]
enabled = false
